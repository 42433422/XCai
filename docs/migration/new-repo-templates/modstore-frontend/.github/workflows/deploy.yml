# 拆仓后 modstore-frontend 独立部署工作流。
name: Market live deploy

on:
  workflow_run:
    workflows: ['CI - Market']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: market-live-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.event == 'push'
        )
      }}
    steps:
      - name: SSH — git pull + npm ci + build market
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            MARKET_DIR="${{ vars.DEPLOY_MARKET_REMOTE_DIR }}"
            BRANCH="${{ vars.DEPLOY_GIT_BRANCH }}"
            if [ -z "${BRANCH}" ]; then BRANCH="main"; fi
            if [ -z "${MARKET_DIR}" ]; then
              echo "[err] 必须设置 DEPLOY_MARKET_REMOTE_DIR"
              exit 1
            fi
            cd "${MARKET_DIR}"
            git fetch origin "${BRANCH}"
            git pull --ff-only origin "${BRANCH}" || git pull origin "${BRANCH}"
            bash scripts/node-release.sh
            echo "[ok] market deploy finished"
