# 拆仓后 modstore-frontend 仓库的独立 CI。
name: CI - Market

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-market-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  market-ci:
    name: Market subproject
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          VITE_PUBLIC_BASE: '/market/'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14
