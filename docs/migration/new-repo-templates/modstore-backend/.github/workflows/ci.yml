# 拆仓后 modstore-backend 仓库的独立 CI。
# 与 monorepo 的 ci-backend-python.yml 等价；由于历史已去掉 MODstore_deploy/ 前缀，
# working-directory 改为仓库根。

name: CI - Backend Python

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-backend-python-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-python-ci:
    name: MODstore (Python — lint + tests + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web,knowledge,dev]"

      - name: Lint (black + isort)
        run: |
          black --check modstore_server modman tests
          isort --check-only modstore_server modman tests

      - name: Test with coverage (global floor)
        env:
          MODSTORE_JWT_SECRET: ci-test-secret-at-least-32-characters-long
          MODSTORE_DATABASE_URL: "sqlite+pysqlite:///:memory:"
          MODSTORE_PY_COVERAGE_FLOOR: '8'
        run: |
          pytest tests/ -q \
            --cov=modstore_server \
            --cov=modman \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${MODSTORE_PY_COVERAGE_FLOOR}

      - name: Critical modules coverage report (80% floor)
        env:
          WEBHOOK_DISPATCHER_COVERAGE_FLOOR: '60'
        run: |
          python <<'PY'
          import os
          import subprocess

          modules_80 = [
              "modstore_server/payment_orders.py",
              "modstore_server/payment_contract.py",
              "modstore_server/application/payment_gateway.py",
              "modstore_server/eventing/contracts.py",
              "modstore_server/webhook_api.py",
          ]
          for m in modules_80:
              subprocess.run(
                  ["coverage", "report", "--fail-under=80", f"--include={m}"],
                  check=True,
              )
          floor = os.environ.get("WEBHOOK_DISPATCHER_COVERAGE_FLOOR", "60")
          subprocess.run(
              [
                  "coverage",
                  "report",
                  f"--fail-under={floor}",
                  "--include=modstore_server/webhook_dispatcher.py",
              ],
              check=True,
          )
          PY

      - name: Upload Python coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: modstore-coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
