# 拆仓后的 modstore-backend 独立部署工作流。
name: Deploy backend (MODstore)

on:
  workflow_run:
    workflows: ['CI - Backend Python']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.event == 'push'
        )
      }}
    steps:
      - name: SSH — git pull + venv pip + restart + health
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            BACKEND_DIR="${{ vars.DEPLOY_BACKEND_REMOTE_DIR }}"
            BRANCH="${{ vars.DEPLOY_GIT_BRANCH }}"
            HEALTH_URL="${{ vars.DEPLOY_HEALTH_URL }}"
            if [ -z "${BRANCH}" ]; then BRANCH="main"; fi
            if [ -z "${HEALTH_URL}" ]; then HEALTH_URL="http://127.0.0.1:8000/api/health"; fi
            if [ -z "${BACKEND_DIR}" ]; then
              echo "[err] 必须设置 DEPLOY_BACKEND_REMOTE_DIR"
              exit 1
            fi
            cd "${BACKEND_DIR}"
            git fetch origin "${BRANCH}"
            git pull --ff-only origin "${BRANCH}" || git pull origin "${BRANCH}"
            bash scripts/python-release.sh
            curl -fsS "${HEALTH_URL}" | head -c 500
            echo ""
            echo "[ok] backend deploy finished"
