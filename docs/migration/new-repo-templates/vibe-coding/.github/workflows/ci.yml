# 拆仓后 vibe-coding 独立仓库的 CI。
name: CI - Vibe Coding

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-vibe-coding-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vibe-coding-ci:
    name: vibe-coding (Python package)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Test
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            python -c "import vibe_coding; print('vibe_coding import ok:', vibe_coding.__name__)"
          fi
