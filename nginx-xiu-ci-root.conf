# MODstore API upstream 负载均衡
# 两实例分别由 modstore@9999.service / modstore@9998.service 启动。
# 单实例时可注释掉第二个 server 行；scheduler 进程(:9990)不加入此组。
upstream modstore_api {
    least_conn;
    server 127.0.0.1:9999 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:9998 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;
    server_name www.xiu-ci.com xiu-ci.com;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    # 根路径 - 直接指向 MODstore 前端（与 /assets/ 同一 dist 目录）
    location / {
        root /root/成都修茈科技有限公司/MODstore_deploy/market/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源（Vite 带 hash 的 chunk）
    location /assets/ {
        root /root/成都修茈科技有限公司/MODstore_deploy/market/dist;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        root /root/成都修茈科技有限公司/MODstore_deploy/market/dist;
        add_header Cache-Control "no-cache";
    }

    # WebSocket（须长于 location /api/；缺 Upgrade 会导致站内通知失败）
    location /api/realtime/ {
        proxy_pass http://modstore_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 1d;
        proxy_read_timeout 1d;
    }

    # API 请求代理到后端（upstream 负载均衡）
    # 未设置 proxy_read_timeout 时默认约 60s，LLM / 工作台长请求易 504
    location /api/ {
        proxy_pass http://modstore_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # Public MOD Catalog + /v1/mod-sync（upstream 与 /api/ 一致，同进程）
    location /v1/ {
        proxy_pass http://modstore_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 100m;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # 后端文档（通过 upstream 代理，任一实例均可返回 OpenAPI 文档）
    location /docs {
        proxy_pass http://modstore_api/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # 健康检查（被动探活：max_fails/fail_timeout 已在 upstream 中配置）
    location = /api/health {
        proxy_pass http://modstore_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
