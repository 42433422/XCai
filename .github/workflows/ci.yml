# 统一 CI：根 Vue 项目 + MODstore_deploy/market 子项目
# 在 PR 与推送 main 时跑 lint/typecheck/unit/coverage/build/e2e。
# 部署 workflow（market-live-deploy.yml）通过 workflow_run 监听本工作流的成功。
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  root-ci:
    name: Root project (Vue 3 + Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build:no-typecheck
        env:
          VITE_PUBLIC_BASE: '/'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache-root
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pw-${{ runner.os }}-root-

      - name: Install Playwright browsers
        if: steps.pw-cache-root.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit fallback)
        if: steps.pw-cache-root.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: root-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: root-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  market-ci:
    name: Market subproject (MODstore_deploy/market)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: MODstore_deploy/market
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: MODstore_deploy/market/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          VITE_PUBLIC_BASE: '/market/'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache-market
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-market-${{ hashFiles('MODstore_deploy/market/package-lock.json') }}
          restore-keys: |
            pw-${{ runner.os }}-market-

      - name: Install Playwright browsers
        if: steps.pw-cache-market.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit fallback)
        if: steps.pw-cache-market.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-coverage
          path: MODstore_deploy/market/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-playwright-report
          path: MODstore_deploy/market/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
