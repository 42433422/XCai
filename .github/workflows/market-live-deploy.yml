# 在 CI workflow（ci.yml）成功完成后再触发生产部署。
# 这样 lint/typecheck/unit/coverage/build/e2e 任一失败都会阻断部署。
# 仍保留 workflow_dispatch 作为应急手动入口。
#
# 在仓库 Settings → Secrets and variables → Actions 中配置：
#   DEPLOY_HOST          例：119.27.178.147
#   DEPLOY_USER          例：root
#   DEPLOY_SSH_PRIVATE_KEY  登录该用户的私钥全文（含 BEGIN/END）
# 仓库 Variables（Settings → Variables）可选覆盖路径/分支：
#   DEPLOY_REMOTE_REPO、DEPLOY_GIT_BRANCH

name: Market live deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: market-live-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-market-on-server:
    runs-on: ubuntu-latest
    # workflow_run 触发时仅在 CI 通过、且 head_branch 是 main 时部署；
    # workflow_dispatch 永远允许（应急入口）。
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.event == 'push'
        )
      }}
    steps:
      - name: SSH — git pull + npm ci + build market
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            REPO="${{ vars.DEPLOY_REMOTE_REPO }}"
            BRANCH="${{ vars.DEPLOY_GIT_BRANCH }}"
            if [ -z "${REPO}" ]; then REPO="/root/成都修茈科技有限公司"; fi
            if [ -z "${BRANCH}" ]; then BRANCH="main"; fi
            cd "${REPO}"
            git fetch origin "${BRANCH}"
            git pull --ff-only "origin" "${BRANCH}" || git pull "origin" "${BRANCH}"
            cd MODstore_deploy/market
            export VITE_PUBLIC_BASE=/market/
            npm ci
            npm run build
            echo "[ok] market dist updated at $(pwd)/dist"
