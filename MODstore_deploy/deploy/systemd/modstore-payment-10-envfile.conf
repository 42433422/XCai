# 覆盖主 unit 中的 EnvironmentFile，使 Java 支付与 FastAPI 共用同一份 .env（避免双路径漂移导致 JWT 不一致）。
# 安装：sudo cp modstore-payment-10-envfile.conf /etc/systemd/system/modstore-payment.service.d/10-envfile.conf
#      sudo systemctl daemon-reload && sudo systemctl restart modstore-payment
[Service]
EnvironmentFile=
EnvironmentFile=-/root/modstore-git/MODstore_deploy/.env
