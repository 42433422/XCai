# MODstore / XC AGI 生产环境 HTTPS 反代示例（证书路径请按实际替换）
# 将本文件内容合并到站点 nginx 配置后执行 nginx -t && systemctl reload nginx
#
# 压缩与缓存：gzip 在 server 内开启；Vite 产物带 hash 的 JS/CSS 可长期 immutable 缓存。
# index.html 勿长期缓存，便于发版后立刻拿到新入口。
#
# --- WebSocket（站内通知 wss://主机/api/realtime/ws）---
# 若浏览器控制台反复出现 “WebSocket connection to wss://.../api/realtime/ws failed”：
# 1) 本 server 内必须有独立的 location /api/realtime/，且含 Upgrade（不可只靠 location /api/）。
# 2) 在全局 http { } 内增加 map（全站一次即可），下面 proxy_set_header Connection 用 $connection_upgrade：
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
#
# 3) 若域名前有 Cloudflare：控制台 Network → WebSockets 开启；SSL 模式勿用「灵活」导致环回问题。
# 4) 确认 proxy_pass 端口与 modstore 一致（常见 8765 或 9999）。
# 5) 若对 /api 使用了「正则 location」（例如 location ~ ^/(api|modstore)/），正则会压过普通前缀
#    location /api/，导致 WS 仍缺 Upgrade。此时必须用如下前缀并带 ^~：
#       location ^~ /api/realtime/ { ... }
#    （^~ 使该前缀优先于后续正则，参见 nginx 最长匹配与正则优先级说明。）

server {
    listen 443 ssl http2;
    server_name xiu-ci.com www.xiu-ci.com;

    ssl_certificate     /etc/nginx/ssl/xiu-ci.com_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/xiu-ci.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location /market/assets/ {
        alias /var/www/modstore/market/dist/assets/;
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /market/index.html {
        alias /var/www/modstore/market/dist/index.html;
        add_header Cache-Control "no-cache";
    }

    location /market/ {
        alias /var/www/modstore/market/dist/;
        try_files $uri $uri/ /market/index.html;
    }

    # WebSocket（/api/realtime/ws）：必须 Upgrade；需比 location /api/ 更长前缀以单独匹配
    # 本段可独立工作；若全局已配置 map $http_upgrade $connection_upgrade，可将
    #   Connection "upgrade"  改为  Connection $connection_upgrade;
    location /api/realtime/ {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 1d;
    }

# XC Catalog 只读 API（工作台「本地包目录」、MyEmployeesChatView 合并列表等均请求 /v1/packages）。
# 若仅反代 /api 而未包含 /v1，浏览器会得到 404，列表会一直显示「暂无可用员工包」。
#
# 重要：/v1/ 与 /api/ 必须指向**同一** FastAPI 进程（同一 MODSTORE_CATALOG_DIR / 同一 packages.json）。
# 若 /v1 指 Docker:8765、/api 指本机 systemd:9999，会出现「侧栏可见仅目录条目但管理员删除无效」——删在一套盘上，列表仍读另一套。
    location /v1/ {
        proxy_pass         http://127.0.0.1:8765;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_connect_timeout 10s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    # 支付/钱包：浏览器仍只打到本 upstream（Python）。PAYMENT_BACKEND=java 时由 Python 进程内
    # 转发到 JAVA_PAYMENT_SERVICE_URL（常见 http://127.0.0.1:8080），Nginx 无需、也不应单独 location 到 Java。
    # 若此处端口与 Python 实际监听不一致（例如 Python 在 9999），会整站 502，与 Java 无关。
    #
    # 未设置 proxy_read_timeout 时 nginx 默认常约 60s，LLM / 工作台长请求易 504 Gateway Time-out
    # 扫描 PDF 的 /api/knowledge/extract-text 会调视觉模型，若仍 504：①确认本段已 reload；②外层 CDN/另一层反代也有超时；③服务端可调 MODSTORE_PDF_EXTRACT_TEXT_MAX_PAGES（默认仅前若干页预览）。
    location /api/ {
        proxy_pass         http://127.0.0.1:8765;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_connect_timeout 10s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    location /api/payment/notify/ {
        proxy_pass http://127.0.0.1:8765;
    }

    # Python 探针（非 Java）。Java 支付服务请在本机 curl:8080/actuator/health（勿对公网暴露未鉴权 actuator）。
    location /health {
        proxy_pass http://127.0.0.1:8765;
    }
}

server {
    listen 80;
    server_name xiu-ci.com www.xiu-ci.com;
    return 301 https://$host$request_uri;
}
