global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: modstore-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8765

  - job_name: modstore-payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - payment-service:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

