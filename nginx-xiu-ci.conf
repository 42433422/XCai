server {
    listen 80;
    server_name www.xiu-ci.com xiu-ci.com;

    # 根路径 - 门户网站
    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # 静态资源缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # /new/ 路径 - MODstore 前端
    location /new/ {
        alias /root/成都修茈科技有限公司/new/;
        index index.html;
        try_files $uri $uri/ /new/index.html;
    }

    # /new/assets/ 静态资源
    location /new/assets/ {
        alias /root/成都修茈科技有限公司/new/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # /market/ — MODstore 前端（与仓库 ``MODstore_deploy/market/dist`` 一致）
    location /market/ {
        alias /root/成都修茈科技有限公司/MODstore_deploy/market/dist/;
        index index.html;
        try_files $uri $uri/ /market/index.html;
    }

    # API 请求代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:9999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 添加缓存控制
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Public MOD Catalog (/v1) — expose FastAPI catalog endpoints directly
    location /v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # 后端文档
    location /docs {
        proxy_pass http://127.0.0.1:9999/docs;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # CDN回源配置
    location / {
        try_files $uri $uri/ =404;
    }
}
